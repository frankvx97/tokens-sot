name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-validate:
    name: Build & validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify package version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Tag:     $TAG_VERSION"
          echo "Package: $PACKAGE_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "ERROR: tag ($TAG_VERSION) does not match package.json ($PACKAGE_VERSION)"
            exit 1
          fi
          echo "Version is in sync."

      - name: Verify manifest.json has no version field
        run: |
          # Figma rejects unknown properties in manifest.json — a 'version' field
          # causes the plugin to fail to load. This step guards against accidentally
          # adding one back.
          if node -e "const m = require('./manifest.json'); if ('version' in m) { console.error('ERROR: manifest.json must not contain a version field'); process.exit(1); } console.log('manifest.json OK — no version field present.');"; then
            echo "Check passed."
          else
            exit 1
          fi

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dist-${{ github.ref_name }}
          path: dist/
          retention-days: 30
