name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-validate:
    name: Build & validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Verify manifest version matches tag
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          MANIFEST_VERSION=$(node -e "console.log(require('./manifest.json').version)")
          PACKAGE_VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "Tag:      $TAG_VERSION"
          echo "Package:  $PACKAGE_VERSION"
          echo "Manifest: $MANIFEST_VERSION"
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "ERROR: tag ($TAG_VERSION) does not match package.json ($PACKAGE_VERSION)"
            exit 1
          fi
          if [ "$TAG_VERSION" != "$MANIFEST_VERSION" ]; then
            echo "ERROR: tag ($TAG_VERSION) does not match manifest.json ($MANIFEST_VERSION)"
            exit 1
          fi
          echo "All versions are in sync."

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-dist-${{ github.ref_name }}
          path: dist/
          retention-days: 30
